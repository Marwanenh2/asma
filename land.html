<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Château de Raiponce</title>
    <link rel="stylesheet" href="poeme_style.css">
    <style>
        body {
            visibility: hidden;
        }
    </style>
    <script>
        if (localStorage.getItem('asma_logged_in') !== 'true') {
            window.location.href = './index.html';
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.style.visibility = 'visible';
            });
        }
    </script>
</head>

<body>
    <main style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:90vh;">
        <img src="asma.jpg" alt="Asma"
            style="width:120px;height:120px;object-fit:cover;border-radius:50%;box-shadow:0 2px 24px #b721ff33,0 0 0 4px #fff5;border:3px solid #fff;background:#fff8;margin-bottom:28px;">
        <button onclick="window.location.href='./poeme.html'"
            style="padding:16px 38px;background:linear-gradient(90deg,#b721ff,#6a11cb);color:#fff;border:none;border-radius:22px;font-size:1.18em;font-weight:600;box-shadow:0 2px 18px #b721ff44;letter-spacing:0.7px;transition:background 0.3s,box-shadow 0.3s,transform 0.2s;outline:none;">Lire
            le poème</button>
    </main>
    <style>
        @media (max-width:480px) {
            main {
                padding: 32px 0;
            }

            img[alt='Asma'] {
                width: 90px !important;
                height: 90px !important;
            }

            button {
                font-size: 1em !important;
                padding: 13px 18px !important;
            }
        }
    </style>
</body>

</html>
