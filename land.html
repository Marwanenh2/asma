<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Château de Raiponce</title>
    <link rel="stylesheet" href="poeme_style.css">
    <style>
        body {
            visibility: hidden;
        }
    </style>
    <script>
        if (localStorage.getItem('asma_logged_in') !== 'true') {
            window.location.href = 'index.html';
        } else {
            document.addEventListener('DOMContentLoaded', () => {
                document.body.style.visibility = 'visible';
            });
        }
    </script>
</head>

<body>
    <header class="topbar">
        <div class="brand">Asma</div>
        <nav class="nav" aria-label="Main navigation">
            <a href="index.html">Connexion</a>
            <a href="land.html" class="active">Château</a>
            <a href="poeme.html">Poème</a>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-text">
                <h1>🧡 Le Château Enchanté</h1>
                <p>Découvrez les légendes de la tour dorée de Raiponce et plongez dans la magie.</p>
                <a class="button" href="poeme.html">Lire le Poème</a>
            </div>
            <div class="hero-image">
                <img src="asma.jpg" alt="Asma Raiponce">
            </div>
        </section>


        <section class="content-wrapper">
            <div class="text-section">
                <strong>Explorez la tour</strong><br>
                Cliquez sur le bouton pour traverser la porte enchantée et lire la lettre dédiée à Asma.
            </div>
            <div class="image-section">
                <img src="asma.jpg" alt="Asma Raiponce">
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>© 2026 Asma – Un voyage magique vous attend.</p>
    </footer>

    <script>
        async function updateLastLogin() {
            const defaultLastLogin = localStorage.getItem('asma_last_login');
            let lastLogin = null;
            try {
                const res = await fetch('https://api.countapi.xyz/get/asma-site/last-login', { cache: 'no-store' });
                if (!res.ok) throw new Error('failed');
                const data = await res.json();
                lastLogin = data.value;
                if (lastLogin) {
                    localStorage.setItem('asma_last_login', lastLogin);
                }
            } catch {
                // ignore: fall back to local storage
                lastLogin = defaultLastLogin;
            }
            showLastLogin(lastLogin);
        }

        function showLastLogin(lastLogin) {
            const el = document.getElementById('last-login');
            if (!lastLogin) {
                el.textContent = "Première connexion ! Bienvenue.";
                return;
            }
            const dt = new Date(Number(lastLogin));
            const formatted = dt.toLocaleString(undefined, {
                weekday: 'short',
                year: 'numeric',
                month: 'short',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
            const now = Date.now();
            const diff = now - Number(lastLogin);
            if (diff < 10 * 60 * 1000) {
                el.textContent = `Quelqu'un s'est connecté récemment ! (${formatted})`;
            } else {
                el.textContent = `Dernière connexion sur un autre appareil : ${formatted}`;
            }
        }

        document.addEventListener('DOMContentLoaded', updateLastLogin);

    </script>
    <footer class="footer">
        <div id="last-login-info" style="font-size:0.9em;color:#888;"></div>
    </footer>
    <script>
        async function fetchLastLogin() {
            try {
                const res = await fetch('/api/last-login');
                const data = await res.json();
                if (data.lastLogin && data.lastLogin.date) {
                    const d = new Date(data.lastLogin.date);
                    const ville = data.lastLogin.ville || 'Inconnu';
                    const appareil = data.lastLogin.appareil || 'Inconnu';
                    document.getElementById('last-login-info').textContent = `Dernière connexion : ${ville}, ${d.toLocaleString()} sur ${appareil}`;
                } else {
                    document.getElementById('last-login-info').textContent = 'Aucune connexion récente.';
                }
            } catch {
                document.getElementById('last-login-info').textContent = 'Erreur récupération dernière connexion.';
            }
        }
        fetchLastLogin();
    </script>

</body>

</html>
