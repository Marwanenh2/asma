<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Château Asma</title>
    <link rel="stylesheet" href="login.css">
</head>

<body>
    <div class="login-container">
        <h1>Bienvenue au Château Asma</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nom d'utilisateur" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" id="loginButton">Se connecter</button>
        </form>
        <div id="loginError" class="error-message"></div>
        <div id="last-login" style="margin-top:18px; color:#6a11cb; font-size:0.98em;"></div>
        <button id="resetLoginBtn"
            style="margin-top:10px; background:#b721ff; color:#fff; border:none; border-radius:8px; padding:8px 18px; cursor:pointer;">Réinitialiser
            la dernière connexion</button>
    </div>
    <script src="login.js"></script>
</body>

</html>
