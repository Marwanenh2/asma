<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Château Asma - Connexion</title>
    <link rel="stylesheet" href="poeme_style.css">
    <style>
        .index-container {
            max-width: 370px;
            margin: 40px auto 0 auto;
            background: rgba(255, 255, 255, 0.13);
            border-radius: 22px;
            box-shadow: 0 8px 32px 0 rgba(106, 17, 203, 0.18);
            padding: 28px 18px 32px 18px;
            text-align: center;
        }

        .asma-img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 50%;
            margin-bottom: 18px;
            box-shadow: 0 2px 24px #b721ff33, 0 0 0 4px #fff5;
            border: 3px solid #fff;
            background: #fff8;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        @media (max-width: 480px) {
            .index-container {
                max-width: 98vw;
                padding: 18px 4vw 24px 4vw;
            }

            .asma-img {
                width: 90px;
                height: 90px;
            }
        }
    </style>
</head>

<body class="poeme-bg">
    <div class="index-container">
        <img src="asma.jpg" alt="Asma" class="asma-img">
        <h1 style="color:#b721ff; font-size:1.5em; margin-bottom:18px;">Bienvenue au Château Asma</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Nom d'utilisateur" required
                style="width:90%;margin-bottom:12px;padding:10px;border-radius:10px;border:1px solid #b721ff;">
            <input type="password" id="password" placeholder="Mot de passe" required
                style="width:90%;margin-bottom:12px;padding:10px;border-radius:10px;border:1px solid #b721ff;">
            <button type="submit"
                style="width:100%;padding:12px 0;background:linear-gradient(90deg,#b721ff,#6a11cb);color:#fff;border:none;border-radius:14px;font-size:1.1em;font-weight:600;">Se
                connecter</button>
        </form>
        <div id="loginError" style="color:#b721ff;margin-top:10px;font-size:0.98em;"></div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            if (username === 'Asma' && password === '0209') {
                localStorage.setItem('asma_logged_in', 'true');
                window.location.href = './land.html';
            } else {
                document.getElementById('loginError').textContent = 'Identifiants incorrects. Réessayez.';
            }
        });
    </script>
</body>

</html>
